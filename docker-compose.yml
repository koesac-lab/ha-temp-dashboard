version: "3.8"

services:
  php:
    image: php:8.2-fpm-alpine
    volumes:
      - ./www:/var/www/html
    environment:
      - TZ=Europe/London
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped
